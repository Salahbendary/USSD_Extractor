# render.yaml — Render deployment configuration
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: ussd-kpi-extractor
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GITHUB_TOKEN
        sync: false          # set this manually in Render dashboard
      - key: GITHUB_REPO
        sync: false          # set this manually in Render dashboard
      - key: GITHUB_CSV_PATH
        value: data/kpi_results.csv
      - key: GITHUB_BRANCH
        value: main
    healthCheckPath: /health
    autoDeploy: true         # redeploy automatically on every git push
